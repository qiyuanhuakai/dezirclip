name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-24.04
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Create or reuse release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "DezirClip ${GITHUB_REF_NAME}" \
              --generate-notes \
              --notes "Download the matching installer or standalone dzc archive for your platform."
          fi
          release_id="$(gh release view "${GITHUB_REF_NAME}" --json databaseId --jq '.databaseId')"
          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"

  publish-tauri:
    name: Tauri release (${{ matrix.name }})
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            platform: ubuntu-24.04
            args: ''
            rust_target: ''
            msvc_arch: ''
          - name: linux-aarch64
            platform: ubuntu-24.04-arm
            args: ''
            rust_target: ''
            msvc_arch: ''
          - name: windows-x86_64
            platform: windows-latest
            args: ''
            rust_target: ''
            msvc_arch: ''
          - name: windows-aarch64
            platform: windows-latest
            args: --target aarch64-pc-windows-msvc
            rust_target: aarch64-pc-windows-msvc
            msvc_arch: amd64_arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libpipewire-0.3-dev \
            libgbm-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxtst-dev \
            xdg-utils

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        if: matrix.rust_target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.rust_target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup MSVC ARM64 toolchain
        if: matrix.msvc_arch != ''
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: pnpm run release:set-version ${{ github.ref_name }}

      - name: Publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseName: DezirClip ${{ github.ref_name }}
          releaseBody: Download the matching installer or standalone dzc archive for your platform.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  publish-dzc:
    name: dzc standalone release (${{ matrix.name }})
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            platform: ubuntu-22.04
            archive_ext: tar.gz
            cargo_args: ''
            binary_path: target/release/dzc
            rust_target: ''
            msvc_arch: ''
          - name: linux-aarch64
            platform: ubuntu-24.04-arm
            archive_ext: tar.gz
            cargo_args: ''
            binary_path: target/release/dzc
            rust_target: ''
            msvc_arch: ''
          - name: windows-x86_64
            platform: windows-latest
            archive_ext: zip
            cargo_args: ''
            binary_path: target/release/dzc.exe
            rust_target: ''
            msvc_arch: ''
          - name: windows-aarch64
            platform: windows-latest
            archive_ext: zip
            cargo_args: --target aarch64-pc-windows-msvc
            binary_path: target/aarch64-pc-windows-msvc/release/dzc.exe
            rust_target: aarch64-pc-windows-msvc
            msvc_arch: amd64_arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        if: matrix.rust_target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.rust_target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup MSVC ARM64 toolchain
        if: matrix.msvc_arch != ''
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: dzc-standalone -> target

      - name: Set release version
        run: node scripts/set-release-version.mjs ${{ github.ref_name }}

      - name: Resolve dzc artifact name
        shell: bash
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          echo "DZC_ARCHIVE=dzc-${release_version}-${{ matrix.name }}.${{ matrix.archive_ext }}" >> "$GITHUB_ENV"

      - name: Build dzc standalone
        working-directory: dzc-standalone
        run: cargo build --release ${{ matrix.cargo_args }}

      - name: Package dzc for Linux
        if: runner.os == 'Linux'
        working-directory: dzc-standalone
        run: |
          binary='${{ matrix.binary_path }}'
          tar -czf "../${DZC_ARCHIVE}" -C "$(dirname "$binary")" "$(basename "$binary")"

      - name: Package dzc for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dzc-standalone/${{ matrix.binary_path }} -DestinationPath $env:DZC_ARCHIVE -Force

      - name: Upload dzc archive to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" "${DZC_ARCHIVE}" --clobber

  publish-flatpak:
    name: Flatpak release (${{ matrix.name }})
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            platform: ubuntu-24.04
          - name: linux-aarch64
            platform: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libpipewire-0.3-dev \
            libgbm-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxtst-dev \
            xdg-utils

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: pnpm run release:set-version ${{ github.ref_name }}

      - name: Resolve Flatpak artifact name
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          echo "FLATPAK_BUNDLE=DezirClip-${release_version}-${{ matrix.name }}.flatpak" >> "$GITHUB_ENV"

      - name: Build Debian bundle for Flatpak root
        run: pnpm tauri build --bundles deb

      - name: Prepare Flatpak root
        run: pnpm run flatpak:prepare

      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//50 org.gnome.Sdk//50

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --repo=flatpak/repo flatpak/build flatpak/io.github.qiyuanhuakai.dezirclip.yml
          flatpak build-bundle flatpak/repo "${FLATPAK_BUNDLE}" io.github.qiyuanhuakai.dezirclip

      - name: Upload Flatpak bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "${FLATPAK_BUNDLE}" --clobber
