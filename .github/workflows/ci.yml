name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  DEZIRCLIP_DISABLE_LINUX_SERVICES: window_tracker,edge_docking,mouse_hotkey

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check i18n keys
        run: pnpm run i18n:check

      - name: Run unit tests
        run: pnpm run test:unit

      - name: Build frontend
        run: pnpm run build

  tauri:
    name: Tauri backend (${{ matrix.name }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            platform: ubuntu-24.04
            cargo_args: ''
            rust_target: ''
            msvc_arch: ''
            can_test: true
          - name: linux-aarch64
            platform: ubuntu-24.04-arm
            cargo_args: ''
            rust_target: ''
            msvc_arch: ''
            can_test: true
          - name: windows-x86_64
            platform: windows-latest
            cargo_args: ''
            rust_target: ''
            msvc_arch: ''
            can_test: true
          - name: windows-aarch64
            platform: windows-latest
            cargo_args: --target aarch64-pc-windows-msvc
            rust_target: aarch64-pc-windows-msvc
            msvc_arch: amd64_arm64
            can_test: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libpipewire-0.3-dev \
            libgbm-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxtst-dev \
            xdg-utils

      - name: Install Rust stable
        if: matrix.rust_target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.rust_target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup MSVC ARM64 toolchain
        if: matrix.msvc_arch != ''
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Test Tauri crate
        if: matrix.can_test
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri crate
        working-directory: src-tauri
        run: cargo build ${{ matrix.cargo_args }}

  dzc-standalone:
    name: dzc standalone
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: dzc-standalone -> target

      - name: Test dzc standalone
        working-directory: dzc-standalone
        run: cargo test

      - name: Build dzc standalone
        working-directory: dzc-standalone
        run: cargo build
